<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音符小精靈 · 音名大闖關</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景飄動音符 -->
    <div class="bg-note note-1">🎵</div><div class="bg-note note-2">🎼</div><div class="bg-note note-3">♪</div><div class="bg-note note-4">♫</div>
    <button class="sound-toggle" id="soundToggle" title="音效開關">🔊</button>

    <!-- ===================================== -->
    <!-- 介面一：大廳與設定 (Setup Screen) -->
    <!-- ===================================== -->
    <div id="screen-setup" class="screen active">
        <div>
            <h1 class="game-title">音符小精靈 · 音名大闖關</h1>
            <div class="game-subtitle">看譜識音 互動訓練</div>
        </div>

        <div class="card">
            <div class="user-info-area">
                <div class="user-field" id="nameField"><label>👤</label><input type="text" id="userName" placeholder="輸入姓名" autocomplete="off"></div>
                <div class="user-field" id="gradeField">
                    <label>📌</label>
                    <select id="userGrade">
                        <option value="1">小一</option><option value="2">小二</option><option value="3">小三</option>
                        <option value="4">小四</option><option value="5">小五</option><option value="6" selected>小六</option>
                    </select>
                </div>
                <div class="user-field" id="classField">
                    <label>📚</label>
                    <select id="userClass">
                        <option value="A">A班</option><option value="B">B班</option><option value="C">C班</option>
                        <option value="D">D班</option><option value="E">E班</option><option value="F">F班</option>
                    </select>
                </div>
                <div class="user-field" id="idField"><label>🔢</label><input type="number" id="userId" placeholder="座號" autocomplete="off"></div>
            </div>
        </div>

        <div class="card">
            <div class="settings-header" id="settingsToggleBtn">
                <span>⚙️ 自定義練譜設定</span>
                <span id="settingsArrow">▼ 展開</span>
            </div>
            <div class="settings-content" id="settingsContent">
                <div class="settings-group" style="background:#FFF9E6; border-color:#F4BA42; margin-bottom:16px;">
                    <label class="group-title">📚 課本同步難度（選擇後會鎖定下方選項）</label>
                    <select class="settings-select" id="textbookMode">
                        <option value="0">自由設定模式</option>
                        <option value="1">小一：僅高音譜自然音（無加線）</option>
                        <option value="2">小二：高音譜自然音（含下加線）</option>
                        <option value="3">小三：高音譜 + 少量升號</option>
                        <option value="4">小四：高低音譜混合</option>
                        <option value="5">小五：高低音譜 + 升降號</option>
                        <option value="6">小六：全難度大混戰</option>
                    </select>
                </div>
                <div class="settings-grid">
                    <div class="settings-group" id="clefGroup">
                        <label class="group-title">📝 練習譜號</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item checked"><input type="checkbox" id="clefTreble" checked> 高音</label>
                            <label class="checkbox-item checked"><input type="checkbox" id="clefBass" checked> 低音</label>
                            <label class="checkbox-item"><input type="checkbox" id="clefAlto"> 中音</label>
                            <label class="checkbox-item"><input type="checkbox" id="clefTenor"> 次中音</label>
                        </div>
                    </div>
                    <div class="settings-group" id="accidentalGroup">
                        <label class="group-title">🎵 升降號</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item checked"><input type="checkbox" id="accidentalSharp" checked> 升號(#)</label>
                            <label class="checkbox-item checked"><input type="checkbox" id="accidentalFlat" checked> 降號(♭)</label>
                        </div>
                    </div>
                    <div class="settings-group" id="ledgerGroup">
                        <label class="group-title">📏 加線</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item checked"><input type="checkbox" id="ledgerLineAbove" checked> 上加線</label>
                            <label class="checkbox-item checked"><input type="checkbox" id="ledgerLineBelow" checked> 下加線</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <label class="group-title">🎹 符頭與輔助</label>
                        <select class="settings-select" id="noteHeadStyle" style="margin-bottom:8px;">
                            <option value="filled">實心 (四分音符)</option>
                            <option value="whole">空心 (全音符)</option>
                            <option value="half">帶桿空心 (二分音符)</option>
                        </select>
                        <div class="checkbox-group">
                            <label class="checkbox-item checked"><input type="checkbox" id="allowRetry" checked> 允許重試</label>
                            <label class="checkbox-item checked"><input type="checkbox" id="highlightLine" checked> 高亮對齊線</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <label class="group-title">🔊 音效偏好</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" id="noteSoundOnly"> 僅播音高</label>
                            <label class="checkbox-item checked"><input type="checkbox" id="countdownSound" checked> 介面音效</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mode-cards" id="modeCards">
            <div class="mode-card practice active" data-mode="practice">
                <div class="mode-icon">📝</div><div class="mode-name">練習模式</div><div class="mode-desc">無限時間慢慢練</div>
            </div>
            <div class="mode-card challenge" data-mode="speed30">
                <div class="mode-icon">⚡</div><div class="mode-name">30秒速衝</div><div class="mode-desc">考驗絕對反應力</div>
            </div>
            <div class="mode-card challenge" data-mode="classic60">
                <div class="mode-icon">⭐</div><div class="mode-name">1分鐘經典</div><div class="mode-desc">穩紮穩打拼高分</div>
            </div>
            <div class="mode-card challenge" data-mode="noMiss">
                <div class="mode-icon">🔥</div><div class="mode-name">無失誤闖關</div><div class="mode-desc">錯1題直接結束</div>
            </div>
        </div>

        <button class="btn-start" id="startBtn">🚀 開始挑戰</button>
        <button class="btn-view-ranks" id="viewRanksBtn">🏆 查看排行榜</button>
    </div>

    <!-- ===================================== -->
    <!-- 介面二：遊戲核心 (Game Screen) -->
    <!-- ===================================== -->
    <div id="screen-game" class="screen">
        <div class="card" style="padding: 16px;">
            <div class="game-header-bar">
                <div class="user-badge" id="inGameUser">👋 準備中...</div>
                <div class="progress-area">
                    <div class="progress-bar"><div class="progress-fill" id="timeProgress" style="width: 100%;"></div></div>
                    <div class="stat-badge time-badge">⏱️ <span id="timeDisplay">--</span></div>
                    <div class="stat-badge score-badge">💯 <span id="scoreDisplay">0</span></div>
                    <div class="stat-badge combo-badge">🔥 <span id="comboDisplay">0</span></div>
                </div>
            </div>
        </div>

        <div class="staff-container">
            <div class="clef-badge" id="clefBadge">高音譜號</div>
            <div class="countdown-overlay" id="countdownOverlay">3</div>
            <div class="staff-canvas-wrapper" id="canvasWrapper">
                <canvas id="staffCanvas"></canvas>
            </div>
        </div>

        <div class="message-box" id="messageBox">集中注意力，馬上開始！</div>

        <div class="notes-grid" id="notesGrid"></div>

        <div class="action-row">
            <button class="btn-action" id="revealBtn" disabled>👀 偷看答案</button>
            <button class="btn-action" id="skipBtn" disabled>⏩ 跳過</button>
            <button class="btn-action" id="endBtn" disabled>🏁 提早結束</button>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- 介面三：結算與排行榜 (Leaderboard Screen) -->
    <!-- ===================================== -->
    <div id="screen-leaderboard" class="screen">
        <div class="leaderboard-layout">
            
            <!-- 左側結算區 -->
            <div class="report-section">
                <h2 class="report-title">🎯 挑戰完成！</h2>
                <div class="report-grid" id="reportGrid"></div>
                <div id="reportWeakness" class="weakness-box"></div>
                <button class="btn-restart-large" id="backToSetupBtn">🔄 回到大廳再玩一次</button>
            </div>

            <!-- 右側排行區 -->
            <div class="ranking-section">
                <h2 class="rank-title">🏆 英雄榜</h2>
                <div class="rank-filters">
                    <div class="rank-filter"><label>班別</label><select id="rankClassFilter"><option value="0">全部</option><option value="A">A班</option><option value="B">B班</option><option value="C">C班</option><option value="D">D班</option><option value="E">E班</option><option value="F">F班</option></select></div>
                    <div class="rank-filter"><label>年級</label><select id="rankGradeFilter"><option value="0">全部</option><option value="1">小一</option><option value="2">小二</option><option value="3">小三</option><option value="4">小四</option><option value="5">小五</option><option value="6" selected>小六</option></select></div>
                    <div class="rank-filter"><label>模式</label><select id="rankModeFilter"><option value="speed30">30秒速衝</option><option value="classic60" selected>1分鐘經典</option><option value="noMiss">無失誤闖關</option></select></div>
                </div>
                <div class="rank-list" id="rankList">
                    <div style="text-align:center; padding:30px; color:var(--text-light); font-weight:800;">📡 載入中...</div>
                </div>
                <div style="text-align:center; font-size:0.8rem; color:#888;">即時連線至雲端資料庫</div>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
